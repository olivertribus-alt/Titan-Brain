    incident_store_path: "/tmp/titan_brain/incidents"
    dynamic_braking_enabled: true
    safety_policy_version: "TB-SAFE-0.2.0"
    clearance_threshold_m: 0.50
    confidence_threshold: 0.70
    braking_policy_version: "TB-BRAKE-0.2.0"
    reaction_time_ns: 250000000
    assured_deceleration_mps2: 1.0
    clearance_margin_m: 0.50
    motion_envelope_frame_id: "base_link"
    publish_motion_envelope: true
    stability_enabled: true
    stability_policy_version: "TB-STABILITY-0.1.0"
    clearance_hysteresis_m: 0.10
    recovery_hold_time_s: 0.20
    observability_policy_version: "TB-OBS-004-0.1.0"
    receive_to_decision_budget_s: 0.05
    decision_to_publish_budget_s: 0.02
    end_to_end_budget_s: 0.07

velocity_arbiter_node:
