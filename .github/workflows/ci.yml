name: Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Quality Gate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --constraint requirements/constraints.txt -e ".[dev]"

      - name: Run Ruff (Linter)
        run: ruff check core tests ros2_ws

      - name: Run Mypy (Type Checker)
        run: mypy core tests

      - name: Run Pytest with Coverage
        run: pytest --cov=core --cov-report=term-missing --cov-fail-under=85

  ros-jazzy:
    name: ROS 2 Jazzy Container Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build reproducible ROS 2 Jazzy image
        run: docker build --tag titan-brain-dev:ci .

      - name: Run complete container quality gate
        run: docker run --rm titan-brain-dev:ci scripts/quality-gate.sh all
