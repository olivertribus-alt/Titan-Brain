name: Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Quality Gate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff (Linter)
        run: ruff check core tests ros2_ws

      - name: Run Mypy (Type Checker)
        run: mypy core tests

      - name: Run Pytest with Coverage
        run: pytest --cov=core --cov-report=term-missing --cov-fail-under=85

  ros-jazzy:
    name: ROS 2 Jazzy Transport
    runs-on: ubuntu-latest
    container:
      image: ubuntu:noble
    timeout-minutes: 20
    env:
      TB_CI_VENV: /tmp/titan-brain-ci-venv

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up ROS 2 Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Create isolated Python environment
        shell: bash
        run: |
          apt-get update
          apt-get install --no-install-recommends -y python3-venv
          python3 -m venv --system-site-packages "${TB_CI_VENV}"
          "${TB_CI_VENV}/bin/python" -m pip install --upgrade pip
          "${TB_CI_VENV}/bin/python" -m pip install -e ".[dev]"
          source /opt/ros/jazzy/setup.bash
          "${TB_CI_VENV}/bin/python" -c "import pydantic, rclpy"

      - name: Install ROS package dependencies
        shell: bash
        run: |
          rosdep install \
            --from-paths ros2_ws/src \
            --ignore-src \
            --rosdistro jazzy \
            --as-root pip:false \
            -y

      - name: Build ROS 2 packages
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon --log-base ros2_ws/log build \
            --base-paths ros2_ws/src \
            --build-base ros2_ws/build \
            --install-base ros2_ws/install \
            --event-handlers console_direct+

      - name: Run ROS 2 runtime tests
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          source ros2_ws/install/setup.bash
          "${TB_CI_VENV}/bin/python" -m pytest \
            ros2_ws/src/titan_brain_ros/test/test_safety_observation_node.py \
            -q
